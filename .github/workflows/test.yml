name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run migrations
        run: python manage.py migrate --settings=maltomaia.settings.dev

      - name: Run tests
        run: python manage.py test --settings=maltomaia.settings.dev --verbosity=2

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK nao configurado — deploy pulado."
            exit 0
          fi
          curl -fsS -X POST "$HOOK" > /dev/null
          echo "Deploy disparado no Render (testes passaram)."
