{% load maltomaia %}
<td class="c-item ed-cell">
  {% csrf_token %}
  <div class="ed-label">{{ fs.label }}</div>
  <div class="ed-foto">
    <span class="ed-foto-thumb" data-foto-thumb>
      {% if fs.url %}<img src="{{ fs.url }}" alt="" />
      {% else %}<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>{% endif %}
    </span>
    <button type="button" class="btn btn-ghost btn-sm js-foto-pick">{% t 'adm.photoChange' %}</button>
    <button type="button" class="ed-foto-remove js-foto-remove" {% if not fs.tem_override %}hidden{% endif %}>Voltar ao padrão</button>
    <input type="file" name="foto" accept="image/*" class="js-foto-input" hidden />
    <input type="hidden" name="foto_clear" value="" />
  </div>
  {% if erro_foto %}<div class="ed-err">{{ erro_foto }}</div>{% endif %}
</td>
<td class="ed-cell" colspan="2"><div class="text-muted" style="font-size:13px;max-width:320px">A imagem é encolhida e comprimida sozinha antes de salvar. Vazio = volta a usar a foto padrão do site.</div></td>
<td class="c-act ed-cell">
  <div class="row-actions" style="justify-content:flex-end">
    <button type="button" class="iconbtn icon js-ed-save" data-action="{% url 'painel:foto_site_editar' fs.slug %}" title="{% t 'adm.save' %}" aria-label="{% t 'adm.save' %}">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    </button>
    <button type="button" class="iconbtn icon js-ed-cancel" title="{% t 'adm.cancel' %}" aria-label="{% t 'adm.cancel' %}">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
</td>
