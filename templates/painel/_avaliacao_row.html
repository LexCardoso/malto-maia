{% load maltomaia %}<tr>
  <td class="c-item"><div class="nm">{{ av.autor }}</div><div class="ds">{{ av.texto|truncatechars:90 }}</div></td>
  <td class="c-cat text-muted" data-l="Fonte">{{ av.get_fonte_display }}</td>
  <td class="c-rate" data-l="Nota"><span class="stars" style="font-size:14px">{{ av.estrelas }}</span></td>
  <td class="c-disp center" data-l="No site">
    <form method="post" class="js-toggle" action="{% url 'painel:avaliacao_toggle' av.pk %}">{% csrf_token %}
      <button type="submit" class="switch {% if av.aparece %}on{% endif %}" title="Aparece no site"><span class="knob"></span></button>
    </form>
  </td>
  <td class="c-act">
    <div class="row-actions" style="justify-content:flex-end">
      <a class="iconbtn icon js-edit" href="{% url 'painel:avaliacao_editar' av.pk %}" title="{% t 'adm.edit' %}" aria-label="{% t 'adm.edit' %}">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      </a>
      <form method="post" action="{% url 'painel:avaliacao_excluir' av.pk %}" onsubmit="return confirm('Remover avaliação de “{{ av.autor|escapejs }}”?')">{% csrf_token %}
        <button class="iconbtn icon danger" type="submit" title="{% t 'adm.delete' %}" aria-label="{% t 'adm.delete' %}">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </form>
    </div>
  </td>
</tr>
