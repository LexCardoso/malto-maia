{% load maltomaia %}<tr>
  <td class="c-item">
    <div class="nm">{{ i.nome }}{% if i.destaque %} <span class="star" title="{% t 'common.signature' %}">★</span>{% endif %}</div>
    {% if i.desc_pt %}<div class="ds">{{ i.desc_pt }}</div>{% endif %}
  </td>
  <td class="c-cat text-muted" data-l="{% t 'adm.col.cat' %}">{{ i.categoria.nome_pt }}</td>
  <td class="c-price" data-l="{% t 'adm.col.price' %}">{% if i.preco %}{{ i.preco|brl }}{% else %}<span class="text-muted">{% t 'adm.priceTbd' %}</span>{% endif %}</td>
  <td class="c-disp center" data-l="{% t 'adm.available' %}">
    <form method="post" class="js-toggle" action="{% url 'painel:item_toggle' i.pk %}">{% csrf_token %}
      <button type="submit" class="switch {% if i.disponivel %}on{% endif %}" title="{% t 'adm.available' %}"><span class="knob"></span></button>
    </form>
  </td>
  <td class="c-enc center" data-l="{% t 'adm.encomenda' %}">
    <form method="post" class="js-toggle" action="{% url 'painel:item_toggle_encomenda' i.pk %}">{% csrf_token %}
      <button type="submit" class="switch enc {% if i.encomendavel %}on{% endif %}" title="{% t 'adm.encomenda' %}"><span class="knob"></span></button>
    </form>
  </td>
  <td class="c-act">
    <div class="row-actions" style="justify-content:flex-end">
      <a class="iconbtn icon js-edit" href="{% url 'painel:item_editar' i.pk %}" title="{% t 'adm.edit' %}" aria-label="{% t 'adm.edit' %}">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      </a>
      <form method="post" action="{% url 'painel:item_excluir' i.pk %}" onsubmit="return confirm('Remover “{{ i.nome|escapejs }}”?')">{% csrf_token %}
        <button class="iconbtn icon danger" type="submit" title="{% t 'adm.delete' %}" aria-label="{% t 'adm.delete' %}">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </form>
    </div>
  </td>
</tr>
