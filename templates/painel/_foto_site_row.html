{% load maltomaia %}<tr>
  <td class="c-item"><div class="nm">{{ fs.label }}</div><div class="ds">{{ fs.secao }}</div></td>
  <td data-l="Prévia"><span class="fs-thumb">{% if fs.url %}<img src="{{ fs.url }}" alt="" loading="lazy" />{% endif %}</span></td>
  <td data-l="Estado">{% if fs.tem_override %}<span class="badge on">trocada</span>{% else %}<span class="text-muted" style="font-size:13px">padrão</span>{% endif %}</td>
  <td class="c-act">
    <div class="row-actions" style="justify-content:flex-end">
      <a class="iconbtn icon js-edit" href="{% url 'painel:foto_site_editar' fs.slug %}" title="{% t 'adm.edit' %}" aria-label="{% t 'adm.edit' %}">
        <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      </a>
    </div>
  </td>
</tr>
